
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raius</title>
    <link rel="icon" type="image/x-icon" href="images/rhea.png">

    <style>
        body, html{
            font-family: 'UD デジタル 教科書体 N-B', 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: x-large;
            background-color: rgb(36, 30, 39);

            height: 100%;
            margin: 0;
        }

        .bg{
            background-image: url(images/Hope.jpg);
            height: 100%;

            background-position: 0% 23%;
            background-repeat: no-repeat;
            background-size: cover;

            filter: blur(3px);

            opacity: 40%;
        }

        @media screen and (width <= 550px) {
            .bg{
                background-position: 7% 23%;
            }
        }

        .sites{
            position: absolute;

            top: 3%;
            right: 1%;
            /*padding: 16px;*/
        }

        .sites img{
            padding-left: 10px;
            padding-right: 10px;
            opacity: 0.6;
        }
        .sites img:hover{
            opacity: 1;
            
            animation: bounce .6s;
            animation-timing-function: cubic-bezier();
            animation-iteration-count: infinite;
        }
        
        @keyframes bounce {
            0% { transform: translate(0px, 0px); }
            50% { transform: translate(0px, -5px); }
            100% { transform: translate(0px, 0px); }
        }

        .banner-text{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -70%);
            
            font-size: 500%;
            color: wheat;

        }

        .banner-subtext{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            font-size: 200%;
            color: wheat;

            text-align: center;

            transform: translate(-50%, 70%);
        }

        .panel {
            display: block;
        }
        .panel .gallery{
            background-image: url("images/elf.jpg");
            background-position: 0% 30%;
            background-size: cover;
            border-radius: 40px;
            
            width: 100%;
            height: 290px;

            opacity: 1;
        }

        .panel .freelancing{
            background-image: url("images/Hope.jpg");
            background-position: 0% 15%;
            background-size: cover;
            border-radius: 40px;
            
            width: 100%;
            height: 290px;

            opacity: 1;
        }
        
        .panel .commissions{
            background-image: url("images/commission_images/Franz.png");
            background-position: 0% 9%;
            background-size: cover;
            border-radius: 40px;

            width: 100%;
            height: 290px;

            opacity: 1;
        }

        .panel .games{
            background-image: url("images/paint_sketch.jpg");
            background-position: 0% 55%;
            background-size: cover;
            border-radius: 40px;

            width: 100%;
            height: 290px;

            opacity: 1;
        }


        .overlay {
            position: relative;
            width: 100%;
            height:100%;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;

            background-color: #1a1318;
            overflow: hidden;
            
            opacity: 0;

            transition: .5s ease;
        }

        .panel:hover{
            animation: bounce 1s;
            animation-timing-function: cubic-bezier();
            animation-iteration-count: infinite;
        }
        
        .panel:hover .overlay {
            opacity: 0.7;
        }

        .overlay-text {
            color: wheat;
            font-size: 6vw;
            position: absolute;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            text-align: center;
        }

        @media screen and (max-width: 992px) {
            .bg{
                background-position: 55% 0%;
            }
            .overlay{
                opacity: 0.7;
            }
            .panel .gallery{
                background-image: url("images/elf.jpg");
                background-position: 15% 30%;
                background-size: 150%;
            }
            .panel .freelancing{
                background-image: url("images/paint_sketch.jpg");
                background-position: 95% 35%;
                background-size: 200%;
            }
            .panel .commissions{
                background-image: url("images/designs.png");
                background-position: 55% 10%;
                background-size: 150%;
            }
        }

        @media screen and (height <= 420px) {
            .banner-text{
                font-size: 400%;
            }
            .banner-subtext{
                font-size: 200%;
            }
        }
    </style>
</head>
<body>
    <!-- BANNER -->
    <div class="bg"></div>
    <div class="banner-text">Raius</div>
    <div class="banner-subtext">Freelance Illustrator</div>

    <div class="sites">
        <a href="https://twitter.com/Raius_"><img src="images/social_media/twitter.png" alt="Twitter icon" width="60"></a>
        <a href="https://www.pixiv.net/users/46380655"><img src="images/social_media/pixiv icon.png" alt="Pixiv icon" width="60"></a>
        <a href="https://raius.itch.io"><img src="images/social_media/itch-icon.png" alt="itch.io icon" width="60" height="60"></a>
        <a href="https://gumroad.com"><img src="images/social_media/gumroad.png" alt="Gumroad icon" width="60"></a>
    </div>
    <!-- BANNER END -->

    <!-- OPTIONS -->
    <div class="panel">
        <a href="gallery.html">
            <div class="gallery">
                <div class="overlay">
                    <div class="overlay-text">Portfolio</div>
                </div>
            </div>
        </a>
    </div>

    <div class="panel">
        <a href="freelancing.html">
            <div class="freelancing">
                <div class="overlay">
                    <div class="overlay-text">Freelancing [AVAILABLE]</div>
                </div>
            </div>
       </a>
    </div>

    <div class="panel">
        <a href="commissions.html">
            <div class="commissions">
                <div class="overlay">
                    <div class="overlay-text">Commissions [CLOSED]</div>
                </div>
            </div>
       </a>
    </div>

    <div class="panel">
        <a href="games.html">
            <div class="games">
                <div class="overlay">
                    <div class="overlay-text">Games</div>
                </div>
            </div>
       </a>
    </div>
    <!-- OPTIONS END -->

</body>
</html>
