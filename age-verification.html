<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Age Verification</title>

    <style>
        html{
            font-family: 'UD デジタル 教科書体 N-B', 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: x-large;
            background-color: rgb(36, 30, 39);
        }

        span{
            color: orange;
            text-decoration: underline;
            text-underline-offset: 10px;
        }

        .age-verification{
            display: block;
            border-radius: 30px;

            padding: 30px;
            margin-left: auto;
            margin-right: auto;
            width: 50%;

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            color: white;

            background-color: rgba(22, 17, 24, 0.85);

            font-size: xx-large;
            text-align: center;
        }

        button{
            display: block;
            width: 30%;
            height: 80px;
            margin: 20px auto 30px auto;
            
            border-radius: 20px;

            font-size: x-large;
        }

        button:hover{
            background-color: darkorange;
            color: white;
        }

        button:focus{
            background-color: orange;
            color: white;
        }

        @media screen and (max-width: 992px){
            .age-verification{
                width: 80%;
            }

            button{
                width: 70%;
            }
        }

        @media screen and (height <= 420px) {
            .age-verification{
                height: 80%;
                position: relative;
                top: 0%;
                left: 0%;
                transform: translate(0%, 0%);
                padding: 10px 20px;
            }

            button{
                width: 50%;
            }
        }
    </style>
</head>
<body>
    <div class="age-verification">
        <h1>Content Warning</h1>

        <div class="main">
            <p>
                This site contains (infrequent) mild nudity and violence.
                <br>
                <br>
                By entering you acknowledge that you are comfortable with that.
            </p>

            <button id="yes-button" onclick="overAge()">Enter</button>
            <button id="no-button" onclick="goBack()">Go back</button>
        </div>
    </div>

    <script src="age-verification.js"></script>
</body>
</html>
